<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="128" height="128" fill="none">
  <!-- chip pins -->
  <g stroke="#30B230" stroke-width="3" stroke-linecap="round">
    <line x1="18" y1="4" x2="18" y2="12"/>
    <line x1="32" y1="4" x2="32" y2="12"/>
    <line x1="46" y1="4" x2="46" y2="12"/>

    <line x1="18" y1="52" x2="18" y2="60"/>
    <line x1="32" y1="52" x2="32" y2="60"/>
    <line x1="46" y1="52" x2="46" y2="60"/>

    <line x1="4" y1="18" x2="12" y2="18"/>
    <line x1="4" y1="32" x2="12" y2="32"/>
    <line x1="4" y1="46" x2="12" y2="46"/>

    <line x1="52" y1="18" x2="60" y2="18"/>
    <line x1="52" y1="32" x2="60" y2="32"/>
    <line x1="52" y1="46" x2="60" y2="46"/>
  </g>

  <!-- outer chip -->
  <rect x="12" y="12" width="40" height="40" rx="8" stroke="#30B230" stroke-width="3.5"/>

  <!-- inner border -->
  <rect x="17" y="17" width="30" height="30" rx="4" stroke="#30B230" stroke-width="2.5"/>

  <!-- AI text -->
  <text x="32" y="39"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="18"
        font-weight="700"
        fill="#30B230">
    AI
  </text>
</svg>